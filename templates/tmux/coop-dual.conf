# tmux layout for dual-station co-op session
# Usage: tmux new-session -s coop \; source-file templates/tmux/coop-dual.conf

# Split vertically: left = Station A, right = Station B
split-window -h

# Left pane: Host station
select-pane -t 0
send-keys "coop-claude start --name Host --role architect --partner Guest" Enter

# Right pane: Guest station
select-pane -t 1
send-keys "coop-claude join --name Guest --role ux" Enter

# Equal sizing
select-layout even-horizontal
